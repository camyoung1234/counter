<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
</head>
<body>
    <div class="container">
        <h1>Counter</h1>
        <div id="count-display">0</div>
        <div class="buttons">
            <button id="minus-btn" aria-label="Decrease count">-</button>
            <button id="plus-btn" aria-label="Increase count">+</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
