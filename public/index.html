<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Counter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..1000&family=Roboto+Flex:wght@100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#673ab7">
</head>
<body>
    <main class="cards-wrapper">
        <div class="counter-card">
            <button id="reset-btn-1" class="reset-btn">Reset</button>
            <div class="count-display">
                <span id="count-display-1">0</span><span class="separator">/</span><span id="target-display-1" contenteditable="true" inputmode="numeric" aria-label="Target value">0</span>
            </div>
            <div class="buttons">
                <button id="minus-btn-1" class="btn minus-btn" aria-label="Decrease count">-</button>
                <button id="plus-btn-1" class="btn plus-btn" aria-label="Increase count">+</button>
            </div>
        </div>
        <div class="counter-card">
            <button id="reset-btn-2" class="reset-btn">Reset</button>
            <div class="count-display">
                <span id="count-display-2">0</span><span class="separator">/</span><span id="target-display-2" contenteditable="true" inputmode="numeric" aria-label="Target value">0</span>
            </div>
            <div class="buttons">
                <button id="minus-btn-2" class="btn minus-btn" aria-label="Decrease count">-</button>
                <button id="plus-btn-2" class="btn plus-btn" aria-label="Increase count">+</button>
            </div>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
