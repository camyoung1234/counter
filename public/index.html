<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Counter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..1000&family=Roboto+Flex:wght@100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#673ab7">
</head>
<body>
    <button id="reset-btn">Reset</button>
    <div class="container">
        <div class="counter-layout">
            <button id="minus-btn" aria-label="Decrease count">-</button>
            <div id="count-display">0</div>
            <button id="plus-btn" aria-label="Increase count">+</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
